spring.application.name=zuul-gateway
server.port=9527

eureka.client.service-url.defaultZone=http://localhost:7001/eureka
# ฦมฑฮิญยทพถตฤทรฮสฃฌมํฃบzuul.ignored-services="*"ฟษาิฦมฑฮห๙ำะิญร๛ณฦ
# zuul.ignored-services=user-consumer

# นซนฒวฐืบ
#zuul.prefix=/

# ษ่ึรด๚ภํตฤทรฮสร๛
